name: Build AI-VOX3 Music Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.5.4

      - name: Build firmware
        shell: bash
        run: |
          . $HOME/esp/esp-idf/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Merge binary
        shell: bash
        run: |
          . $HOME/esp/esp-idf/export.sh
          esptool.py --chip esp32s3 merge_bin -o build/aivox3-music-full.bin @build/flash_args

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: aivox3-music-firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/xiaozhi.bin
            build/aivox3-music-full.bin
            build/flash_args
            build/generated_assets.bin
          retention-days: 90
