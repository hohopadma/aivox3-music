name: Build AI-VOX3 Music Firmware

on:
  push:
    branches: [ "main", "master", "ai-vox3" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32s3

      - name: Build firmware
        run: |
          idf.py set-target esp32s3
          idf.py build

      - name: Generate version info
        id: info
        run: |
          echo "version=$(git describe --tags --always 2>/dev/null || echo 'dev')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: aivox3-music-${{ steps.info.outputs.version }}
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/xiaozhi.bin
            build/flash_args
            build/generated_assets.bin
            sdkconfig
          retention-days: 90

      - name: Merge binary for easy flashing
        run: |
          pip install esptool
          esptool.py --chip esp32s3 merge_bin \
            -o build/aivox3-music-full.bin \
            @build/flash_args

      - name: Upload merged binary
        uses: actions/upload-artifact@v4
        with:
          name: aivox3-music-merged.bin
          path: build/aivox3-music-full.bin
          retention-days: 90
